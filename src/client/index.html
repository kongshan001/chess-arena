<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Arena - 棋阵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            gap: 2px;
            background: #2a2a4a;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .cell {
            width: 60px;
            height: 60px;
            background: #3a3a5a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 2rem;
        }
        .cell:hover { background: #4a4a6a; transform: scale(1.05); }
        .cell.light { background: #4a5568; }
        .cell.dark { background: #2d3748; }
        .cell.selected { 
            background: #4299e1; 
            box-shadow: 0 0 20px #4299e1;
        }
        .piece {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .piece.warrior { background: linear-gradient(135deg, #3182ce, #2c5282); }
        .piece.mage { background: linear-gradient(135deg, #805ad5, #6b46c1); }
        .piece.archer { background: linear-gradient(135deg, #38a169, #2f855a); }
        .piece.rogue { background: linear-gradient(135deg, #e53e3e, #c53030); }
        .piece.healer { background: linear-gradient(135deg, #d69e2e, #b7791e); }
        .piece.tank { background: linear-gradient(135deg, #718096, #4a5568); }
        .info {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .status { color: #48bb78; font-weight: bold; }
    </style>
</head>
<body>
    <h1>♟️ Chess Arena</h1>
    <p class="subtitle">H5 自走棋策略竞技游戏</p>
    <div id="game-board"></div>
    <div class="info">
        <p>状态: <span class="status">✅ 核心玩法验证中</span></p>
        <p>MVP Demo - 2026-04-17</p>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const pieces = [
            { pos: 0, type: 'warrior', emoji: '⚔️' },
            { pos: 1, type: 'mage', emoji: '🔮' },
            { pos: 2, type: 'archer', emoji: '🏹' },
            { pos: 3, type: 'rogue', emoji: '🗡️' },
            { pos: 4, type: 'healer', emoji: '💊' },
            { pos: 5, type: 'mage', emoji: '🔮' },
            { pos: 6, type: 'warrior', emoji: '⚔️' },
            { pos: 7, type: 'tank', emoji: '🛡️' },
        ];

        let selected = null;

        // Create 8x8 board
        for (let i = 0; i < 64; i++) {
            const row = Math.floor(i / 8);
            const col = i % 8;
            const cell = document.createElement('div');
            cell.className = `cell ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
            cell.dataset.index = i;
            
            const piece = pieces.find(p => p.pos === i);
            if (piece) {
                const pieceEl = document.createElement('div');
                pieceEl.className = `piece ${piece.type}`;
                pieceEl.textContent = piece.emoji;
                cell.appendChild(pieceEl);
            }

            cell.addEventListener('click', () => {
                if (selected !== null) {
                    document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
                }
                cell.classList.add('selected');
                selected = i;
            });

            board.appendChild(cell);
        }

        // Simple test
        console.log('✅ Chess Arena MVP Demo Loaded');
        console.log('✅ Board rendered: 64 cells');
        console.log('✅ Pieces placed: 8 units');
    </script>
</body>
</html>
